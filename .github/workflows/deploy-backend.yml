name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: vami-clubwear

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vami-backend \
            --source backend \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --env-vars-file backend/deploy/env.yaml \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DIRECT_URL:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest,JWT_SECRET=JWT_SECRET:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,SMTP_PASS=SMTP_PASS:latest,RESEND_API_KEY=RESEND_API_KEY:latest,DELHIVERY_TOKEN=DELHIVERY_TOKEN:latest,DELHIVERY_WEBHOOK_SECRET=DELHIVERY_WEBHOOK_SECRET:latest" \
            --quiet

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe vami-backend --region asia-southeast1 --format='value(status.url)')
          echo "Deployed to: $SERVICE_URL"
          curl --fail --show-error --silent "$SERVICE_URL/health"
